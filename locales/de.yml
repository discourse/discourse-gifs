de:
  gif:
    modal_title: "GIFs suchen"
    query: "Begriff"
    insert: "Ausgewählte Bilder einfügen"
    composer_title: "GIFs suchen"
    no_results: "Gib ein Stichwort in das Eingabefeld oben ein, um nach GIFs zu suchen."
    bad_api_key: "Ungültiger API-Schlüssel für $api_provider. Website-Administratoren, bitte überprüft euren Schlüssel und/oder euer Konto bei $api_provider."
    error_rate_limit: "Wir haben unsere API-Rate-Limits für $api_provider erreicht. Bitte warte und versuche es später noch einmal. Falls das Problem weiterhin besteht, wende dich an deinen Website-Administrator."
